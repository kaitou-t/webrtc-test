/******************************/
/* スキャンオプション */
/******************************/
function scanOptiont() {
	this.op_isScanAlert = false;	// スキャン後にアラート表示するか
	this.op_isScanSound = true;		// スキャン後にサウンド鳴らすか
	this.op_isTestMode = true;		// パンくずの「機器棚卸」文字をダブルクリックで内部画像（解析用）を表示するか
	this.op_isLogMode = true;		// 「機器棚卸」ボタン長押しでログ表示ボタンを表示するか
	this.op_isLogGet = true;		// 「機器棚卸」ボタン自体の過去ログを取得するか
	this.op_isDirectInput = true;	// 「ロケーションコード」、「機器コード」のラベルダブルクリックで直接入力モードに移行するか

	this.__op_isFullscreen = null;
	this.isFullscreenChange =  function (value) {
		if (value !== this.__op_isFullscreen) {
			this.__op_isFullscreen = value;
			var eleFsicon = document.getElementById('fullScreen');
			if(value){
				//フルスクリーン用アイコンを表示する
				eleFsicon.style.display = 'block';
			}else{
			    //フルスクリーンの場合は元に戻す
				if(eleFsicon.style.display == 'none'){
				   fullScreeExit();
				}
				//フルスクリーン用アイコンを非表示にする
				eleFsicon.style.display = 'none';
			}
		}
	}
	Object.defineProperty(this, 'op_isFullscreen', {
		set: function set (value) {this.isFullscreenChange(value);},get: function get () {return this.__op_isFullscreen;}
	});
	this.op_isFullscreen = true;	// フルスクリーン機能を有効にするか
	this.op_isFullscreenEx = true;	// フルスクリーン機能の長押しで拡張フルスクリーンを動作させるか

	this.isTest = false;
	this.setCookie = function() {}
	this.getCookie = function() {}
	this.test = function() {
		this.isTest = !this.isTest;
		if (this.isTest) {
			$('#testBox').css('display', 'block');
		} else {
			$('#testBox').css('display', 'none');
		}
	}
}

/******************************/
/* カメラ処理 */
/******************************/
var scanOptiont = new scanOptiont;
var inputMana = document.getElementById('manageNo');
var inputLoc = document.getElementById('locationCd');
var sound = document.getElementById("Sound");
var lastCode = '';
// QR読み取りクラス
var qrScan = new QrCameraScan;
qrScan.video = document.getElementById('myVideo');
qrScan.canvas = document.createElement('canvas');

$(document).ready(function() {
	//メッセージの設定
	setMessageByState();
});

sound.addEventListener('ended', function(event) {
	var isiOS = navigator.userAgent.match(/(iPhone|iPad|iPod)/i);
	if (isiOS){
		sound.src = sound.src;
		sound.load();
	}
	sound.currentTime = 0;
});

//クラスイベント定義
//カメラ起動時の正常処理定義
qrScan.onCameraStartSuccess = function() {

	//メッセージの設定
	setMessageByState();
	//カメラ起動、カメラ停止ボタン非表示
	$('#myVideoControlBox').slideUp('slow');


	setTimeout(function() {
		$('#cStart').prop('disabled', false);
	}, 500);

	//setTimeout(function() {
	//	$("html,body").animate({scrollTop:$('.breadcrumb').offset().top-5});
	//}, 500);
}

//カメラ起動時のエラー処理定義
qrScan.onCameraStartErr = function() {
	setMessage("カメラが見つかりません。", $("#info_messages"), 1);

	setTimeout(function() {
		$('#cStart').prop('disabled', false);
	}, 500);
}

//カメラ停止時の正常処理定義
qrScan.onCameraStop = function() {

    //フルスクリーンの場合は元に戻す
	if(document.getElementById('fullScreenExit').style.display == 'block'){
	    fullScreeExit();
	}

	//メッセージの設定
	setMessageByState();

	//カメラ起動、カメラ停止ボタン表示
	$('#myVideoControlBox').slideDown('slow');
}

//QRスキャン時の画像処理定義
qrScan.onCameraImage = function(imageData) {
	if (scanOptiont.isTest) {

		var w = qrScan.video.videoWidth;    //カメラ映像：幅
		var h = qrScan.video.videoHeight;   //カメラ映像：高さ
		var cw = qrScan.video.clientWidth;  //表示枠    ：幅
		var ch = qrScan.video.clientHeight; //表示枠    : 高さ

		document.getElementById('jsqr_imageData').width = imageData.width;
		document.getElementById('jsqr_imageData').height = imageData.height;
		document.getElementById('jsqr_imageData').getContext('2d').putImageData(
			imageData, 0, 0);

		document.getElementById('testInfo').innerText = "カメラ映像（w,h）:" + w + "/" +
			h + "　表示領域（w,h）:" + cw + "/" + ch + "　JSQR認識（w,h）:" + imageData.width +	"/" + imageData.height;

		var date = new Date();
		document.getElementById('testTime1').innerText = "onCameraImage: " +
			("0"+date.getHours()).slice(-2) + ':' + ("0"+date.getMinutes()).slice(-2) + ':' + ("0"+date.getSeconds()).slice(-2) + '.' + date.getMilliseconds();

	}
}
qrScan.onErr = function(e) {
	if (scanOptiont.isTest) {
		document.getElementById('testErr').innerText = e ;
	}
}

//QRコードのデータ処理定義
qrScan.onQRCode = function(code) {

	if (scanOptiont.isTest) {
		var codedata = null
		if (code){
			codedata = code.data;
		}else{
			codedata = null;
		}
		var date = new Date();
		document.getElementById('testTime2').innerText = 'onQRCode: ' + codedata + ' ' + lastCode  + ' ' +
		("0"+date.getHours()).slice(-2) + ':' + ("0"+date.getMinutes()).slice(-2) + ':' + ("0"+date.getSeconds()).slice(-2) + '.' + date.getMilliseconds() ;
	}

	if (code && code.data != null && code.data != '' && code.data != lastCode) {
		console.log("Found QR code", code, code.data);
		lastCode = code.data;
		setTimeout(function() {
			lastCode = null;
		}, 2000);
		//ロケーション→機器の順番で設定
		if (!inputLoc.value) {

			try {
				if (scanOptiont.op_isScanSound) {sound.play(); sound.currentTime = 0;}
			} catch (e) {
				console.log(e);
			}
			$("#locationCd").val(code.data).change();

			//[ロケーションコード]\nバーコードのスキャンが成功しました。
			if (scanOptiont.op_isScanAlert) alert(
				'[ロケーションコード]\nバーコードのスキャンが成功しました。');

			//スキャンが成功したので、フルスクリーンの場合は元に戻す
			if(document.getElementById('fullScreenExit').style.display == 'block'){
				fullScreeExit();
			}

		} else if (!inputMana.value) {

			try {
				if (scanOptiont.op_isScanSound) {sound.play(); sound.currentTime = 0;}
			} catch (e) {
				console.log(e);
			}
			$("#manageNo").val(code.data).change();

			//[機器コード]\nバーコードのスキャンが成功しました。
			if (scanOptiont.op_isScanAlert) alert(
				'[機器コード]\nバーコードのスキャンが成功しました。');

			//スキャンが成功したので、フルスクリーンの場合は元に戻す
			if(document.getElementById('fullScreenExit').style.display == 'block'){
				fullScreeExit();
		 	}
		}
	}
}

// カメラの起動
document.getElementById("cStart").addEventListener('click', function() {
	//navigator.getUserMedia = navigator.getUserMedia || navigator.webkitGetUserMedia || window.navigator.mozGetUserMedia;
	$('#cStart').prop('disabled', true);
	try {
		sound.load();
		sound.currentTime = 0;
	} catch (e) {
		console.log(e);
	}

	//カメラを起動する
	qrScan.cameraStart();
}, false);

// カメラの停止
$('.stopper').click( function() {
	//カメラを停止する
	qrScan.cameraStop();
});

var fullScreen_flg = null;

//カメラ画像のフルスクリーンボタンをクリック
$("#fullScreen").on('click',function(){

	// カメラが起動していない時は、フルスクリーンにしない
	if (qrScan.localStream == null) {
		return false;
	}

	if (fullScreen_flg != null) {
		return false;
	}

	fullScreen_flg = 1;
	fullScreen();

});

//カメラ画像のフルスクリーンボタンを長押し
$("#fullScreen_hold").bind("hold", function() {

	if (!scanOptiont.op_isFullscreenEx) return false;

	// カメラが起動していない時は、フルスクリーンにしない
	if (qrScan.localStream == null) {
		return false;
	}

	if (fullScreen_flg != null) {
		return false;
	}

	fullScreen_flg = 2;
	fullScreen();
});

//カメラ画像のフルスクリーン解除ボタンをクリック
$("#fullScreenExit").on('click',function(){
	fullScreeExit();
});

//カメラのフルスクリーンの設定処理
function fullScreen(){

	var eleVideo = document.getElementById('myVideoBox');
	var eleFsicon = document.getElementById('fullScreen');
	var eleFseicon = document.getElementById('fullScreenExit');

	if (fullScreen_flg == 1) {
		//videoタグにフルスクリーン用のclass追加
	  	eleVideo.classList.add('fullScreen');
		//videoタグ以外を非表示にする

		//ブラウザのスクロールを下げているときにvideoタグより先に消えるとブラウザの高さが
		//スクロールなしの状態になるのを回避
	  	//document.getElementById('scanReasultBox').style.display = 'none';
		$('#scanReasultBox').slideUp(1000);

	} else {
		//数値で指定するものはCSSのtransitionでアニメーションになるがposition,displayは要素の数字的な変動がないので
		//アニメーションできないので高さだけ先に指定して、終了後にposition,displayを処理する
		eleVideo.style.height = (document.documentElement.clientHeight -10) + "px";
		setTimeout(function() {
			eleVideo.classList.add('fullScreen2');
		}, 1000);
	}

	//フルスクリーン用アイコンを非表示にする
	eleFsicon.style.display = 'none';
	//フルスクリーン解除用アイコンを表示する
	eleFseicon.style.display = 'block';
}

//カメラのフルスクリーンの解除処理
function fullScreeExit(){

	var eleVideo = document.getElementById('myVideoBox');
	var eleFsicon = document.getElementById('fullScreen');
	var eleFseicon = document.getElementById('fullScreenExit');

	if (fullScreen_flg == 1) {
	   	//videoタグのフルスクリーン用のclass削除
		eleVideo.classList.remove('fullScreen');
		//videoタグ以外を表示にする

		//ブラウザのスクロールを下げているときにvideoタグより先に表示されないとブラウザの高さが
		//スクロールなしの状態になるのを回避
		//document.getElementById('scanReasultBox').style.display = 'block';
		$('#scanReasultBox').slideDown(400);

	} else {
		//数値で指定するものはCSSのtransitionでアニメーションになるがposition,displayは要素の数字的な変動がないので
		//アニメーションできないので高さだけ先に指定して、終了後にposition,displayを処理する
		eleVideo.style.height = "200px";
		setTimeout(function() {
			eleVideo.classList.remove('fullScreen2');
			eleVideo.style.height = "";
		}, 1000);

	}

 	//フルスクリーン用アイコンを表示する
	eleFsicon.style.display = 'block';
	//フルスクリーン解除用アイコンを非表示にする
	eleFseicon.style.display = 'none';

	fullScreen_flg = null;

}

//メッセージの設定
function setMessageByState() {
	//状態によってメッセージの設定内容を変更する。
	if (!qrScan.localStream) {
		//カメラ未起動

		//メッセージ表示(Message:カメラを起動してください)
		setMessage('カメラを起動してください', $(
			"#info_messages"), 1);
	} else if ($("#locationCd").val() == "") {
		//ロケーション入力なし

		//メッセージ表示(Message:ロケーションバーコードを読み込んでください)
		setMessage('ロケーションバーコードを読み込んでください', $(
			"#info_messages"), 1);
	} else if ($("#manageNo").val() == "") {
		//棚卸入力なし

		//メッセージ表示(Message:機器バーコードを読み込んでください)
		setMessage('機器バーコードを読み込んでください', $(
			"#info_messages"), 1);
	} else if ($("#manageNo").val() != "") {
		//棚卸入力あり

		//メッセージ表示(Message:「棚卸処理」ボタンをクリックして棚卸処理を実行してください)
		setMessage('「棚卸処理」ボタンから棚卸処理を実行してください', $(
			"#info_messages"), 1);
	}


	//カメラ側のインフォメーションに動きが有ったら棚卸メッセージ消去
	setMessage("", $("#messages"), 1);

}

//メッセージの設定
function setMessage(message, obj, colorType) {
	//color:文字色 1:黒 0:青 -1:赤
	var color
	if (colorType == 1) {
		color = "#000000";
	}else if (colorType == 0) {
		color = "#0000ff";
	}else if (colorType == -1) {
		color = "#ff0000";
	}else {
		color = "#000000";
	}

	//引数のメッセージを設定
	var msgTag = $("<font>").attr("color", color).text(message);
	obj
		.html(msgTag)
		.trigger('change');
}

//棚卸処理の実行ログ取得
function setItemByLocalStorage(data) {

	if (!scanOptiont.op_isLogGet) return false;

	var kensu = 50;

	var record = null;

	try {
		//前回の保存された値の取得
		record = JSON.parse(localStorage.getItem('Record'));

	} catch (e) {
		console.log(e);
	}

	//取得できない場合初期化
	if (record == null){
		record = [];
	}

	var date = new Date();

	// 年
	var year = date.getFullYear();

	// 月
	var month = ("0" + (date.getMonth() + 1)).slice(-2);

	// 日
	var day = ("0" + date.getDate()).slice(-2);

	// 時
	var hour = ("0" + date.getHours()).slice(-2);

	// 分
	var minute = ("0" + date.getMinutes()).slice(-2);

	// 秒
	var second = ("0" + date.getSeconds()).slice(-2);

	// 文字列結合
	time = year + "/" + month + "/" + day + " " + hour + ":" + minute + ":" + second ;

	//連想配列の追加
 	record.push({moment:time, stateFlg:data.dataFlg, stateMessage:data.message});

	// 要素数を取得
	var leng = Object.keys(record).length;

	//50件まで残して51件目から古いものを削除
	if (leng > kensu){
		for(var i = kensu; i < leng; i++){
			record.shift();
		}
	}

	// データの保存
	localStorage.setItem('Record', JSON.stringify(record));

}

//棚卸処理の実行ログの表示
function setChildTagByLogList() {

	var record = null;

	try {
		//前回の保存された値の取得
		record = JSON.parse(localStorage.getItem('Record'));

	} catch (e) {
		console.log(e);
	}

	//取得できない場合初期化
	if (record == null){
		record = [];
	}

	// タグを追加する親要素をid属性を指定して取得
	let target = document.getElementById('logList');
	//子要素を全て削除
	while(target.lastChild){
		target.removeChild(target.lastChild);
	}

	for (var i = 0; i < record.length; i++) {

		// 一番上の子要素<li>の作成
		var newTag = document.createElement("li");

		// <li>子要素の一つ目のdiv作成
		var newDiv1 = document.createElement("div");
		// class属性の追加
		 newDiv1.setAttribute("class", "marker bg" + record[i].stateFlg);
	    // <li>の子要素として追加
	    newTag.appendChild(newDiv1);

		// <li>子要素の二つ目のdiv作成
		var newDiv2 = document.createElement("div");
		// class属性の追加
		newDiv2.setAttribute("class", "itembox");


		// <li>子要素の三つ目のdiv作成
		var newDiv3 = document.createElement("div");
		newDiv3.setAttribute("class", "item1");
		newDiv3.textContent = record[i].moment;
		// 二つ目のdivの子要素として追加
		newDiv2.appendChild(newDiv3);

		// <li>子要素の四つ目のdiv作成
		var newDiv4 = document.createElement("div");
		newDiv4.setAttribute("class", "item2");
		newDiv4.textContent = record[i].stateMessage;
		// 二つ目のdivの子要素として追加
		newDiv2.appendChild(newDiv4);


		// <li>の子要素として追加
		newTag.appendChild(newDiv2);

		// <li>をlogList子要素の先頭に追加
		target.insertBefore(newTag, target.children[0]);
 	}
}


function resumeVideoAfterClear() {
    // iOS Safari のみ対象
    if (!/iPhone|iPad|iPod/i.test(navigator.userAgent)) return;

    if (qrScan && qrScan.video && qrScan.video.srcObject) {
        const p = qrScan.video.play();
        if (p && typeof p.catch === 'function') {
            p.catch(function(){ /* Safari対策：失敗しても無視 */ });
        }
    }
}
